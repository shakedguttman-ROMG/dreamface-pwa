<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DreamFace" />
  <title>DreamFace — החלפת פנים</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:        #0d0d0d;
      --card:      #161616;
      --card2:     #1e1e1e;
      --border:    #2a2a2a;
      --accent:    #7c3aed;
      --accent-h:  #6d28d9;
      --accent-g:  rgba(124,58,237,0.15);
      --text:      #f0f0f0;
      --muted:     #888;
      --success:   #10b981;
      --error:     #ef4444;
      --radius:    16px;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    header {
      padding: calc(env(safe-area-inset-top) + 16px) 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    header .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.5px; }
    header span { color: var(--muted); font-size: 0.78rem; margin-right: auto; }

    main {
      flex: 1;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 18px 16px calc(env(safe-area-inset-bottom) + 24px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .step {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .step-head {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .step-num {
      width: 26px; height: 26px;
      background: var(--accent-g);
      color: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; flex-shrink: 0;
      border: 1px solid var(--accent);
    }
    .step-title { font-size: 1rem; font-weight: 600; }

    .drop {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 22px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .drop:active, .drop.active { border-color: var(--accent); background: var(--accent-g); color: var(--text); }
    .drop .big { font-size: 1.6rem; display: block; margin-bottom: 6px; }

    .preview {
      margin-top: 12px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      display: none;
      position: relative;
    }
    .preview.show { display: block; }
    .preview img, .preview video { width: 100%; display: block; max-height: 280px; object-fit: contain; }
    .preview .badge {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.7); color: #fff;
      padding: 3px 9px; border-radius: 20px; font-size: 0.72rem;
    }

    .options { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .row label { font-size: 0.88rem; }
    .hint { color: var(--muted); font-size: 0.76rem; }

    input[type=range] { width: 100%; accent-color: var(--accent); }

    .switch { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; cursor: pointer;
      background: #333; border-radius: 26px; transition: .2s;
    }
    .slider::before {
      content: ""; position: absolute; height: 20px; width: 20px;
      right: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s;
    }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(-20px); }

    button {
      font-family: inherit;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .1s, opacity .15s, background .15s;
      width: 100%;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: linear-gradient(135deg, #7c3aed, #db2777); color: #fff; }
    .btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }

    .actions { display: flex; flex-direction: column; gap: 10px; }

    .progress-wrap { display: none; }
    .progress-wrap.show { display: block; }
    .progress-bar {
      height: 8px; background: var(--card2); border-radius: 8px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #7c3aed, #db2777);
      transition: width .2s;
    }
    .progress-text { font-size: 0.82rem; color: var(--muted); margin-top: 8px; text-align: center; }

    .result { display: none; }
    .result.show { display: block; }
    .result canvas, .result img, .result video {
      width: 100%; border-radius: 12px; background: #000; display: block; max-height: 60vh; object-fit: contain;
    }

    .toast {
      position: fixed; bottom: calc(env(safe-area-inset-bottom) + 16px);
      left: 50%; transform: translateX(-50%) translateY(120%);
      background: var(--card2); color: var(--text);
      padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border);
      font-size: 0.88rem; z-index: 100; transition: transform .3s;
      max-width: 90%; text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--error); }

    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.76rem; color: var(--muted);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .dot.ok { background: var(--success); }
    .dot.load { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .private-note {
      text-align: center; color: var(--muted); font-size: 0.74rem;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 4px;
    }

    input[type=file] { display: none; }
  </style>
</head>
<body>
  <header>
    <div class="logo">🎭</div>
    <h1>DreamFace</h1>
    <span>החלפת פנים במכשיר</span>
  </header>

  <main>
    <div class="status-pill" id="modelStatus">
      <span class="dot load" id="modelDot"></span>
      <span id="modelText">טוען מודלים…</span>
    </div>

    <!-- Step 1: source face -->
    <div class="step">
      <div class="step-head">
        <div class="step-num">1</div>
        <div class="step-title">תמונת פנים (מקור)</div>
      </div>
      <div class="drop" id="srcDrop">
        <span class="big">📷</span>
        הקש לבחירת תמונת פנים ברורה
      </div>
      <input type="file" id="srcFile" accept="image/*" />
      <div class="preview" id="srcPreview"><span class="badge">מקור</span></div>
    </div>

    <!-- Step 2: target -->
    <div class="step">
      <div class="step-head">
        <div class="step-num">2</div>
        <div class="step-title">תמונה או סרטון יעד</div>
      </div>
      <div class="drop" id="tgtDrop">
        <span class="big">🎬</span>
        הקש לבחירת תמונה או סרטון
      </div>
      <input type="file" id="tgtFile" accept="image/*,video/*" />
      <div class="preview" id="tgtPreview"><span class="badge" id="tgtBadge">יעד</span></div>
    </div>

    <!-- Step 3: options -->
    <div class="step">
      <div class="step-head">
        <div class="step-num">3</div>
        <div class="step-title">הגדרות</div>
      </div>
      <div class="options">
        <div class="row">
          <label>עיבוד חלק (feather)</label>
          <label class="switch"><input type="checkbox" id="optSmooth" checked><span class="slider"></span></label>
        </div>
        <div class="row">
          <label>חוזק ערבוב</label>
          <span class="hint" id="blendVal">100%</span>
        </div>
        <input type="range" id="optBlend" min="50" max="100" value="100" />
        <div class="hint">טיפ: סרטונים ארוכים יעבדו לאט — מומלץ קטעים קצרים.</div>
      </div>
    </div>

    <!-- Step 4: run -->
    <div class="step">
      <div class="step-head">
        <div class="step-num">4</div>
        <div class="step-title">הפעלה</div>
      </div>
      <div class="actions">
        <button class="btn-primary" id="runBtn" disabled>🔄 החלף פנים</button>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-text" id="progressText">מתחיל…</div>
        </div>
      </div>
    </div>

    <!-- Result -->
    <div class="step result" id="resultStep">
      <div class="step-head">
        <div class="step-num">✓</div>
        <div class="step-title">התוצאה</div>
      </div>
      <div id="resultMedia"></div>
      <div class="actions" style="margin-top:12px;">
        <button class="btn-secondary" id="downloadBtn">⬇️ הורדת התוצאה</button>
        <button class="btn-ghost" id="resetBtn">🔁 התחלה חדשה</button>
      </div>
    </div>

    <div class="private-note">
      🔒 הכל מעובד במכשיר שלך. דבר לא נשלח לשרת.
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="vendor/face-api.js"></script>
  <script src="vendor/delaunator.js"></script>
  <script src="vendor/ort.all.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
